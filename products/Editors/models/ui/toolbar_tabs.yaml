version: 1

start_menu:
  expected:
    - Главная
    - Шаблоны
    - Локальные файлы
    - Совместная работа
    - Настройки
    - О программе

start_screen:
  sections:
    home:
      expected: 'Отображается раздел «Главная»: блок «Самое время начать», плитки «Документ/Таблица/Презентация» и действие «Открыть файл».'
      tokens:
        - Самое время начать
        - Создавайте новые файлы
        - Документ
        - Таблица
        - Презентация
        - Открыть файл
      need: 2
    templates:
      expected: 'Отображается раздел «Шаблоны»: «Шаблоны документов», «Избранное», «Подключить папку».'
      tokens:
        - Шаблоны документов
        - Избранное
        - Подключить папку
      need: 2
    local:
      expected: 'Отображается раздел «Локальные файлы»: «Последние файлы», «Открытые», «Для восстановления».'
      tokens:
        - Локальные файлы
        - Последние файлы
        - Открытые
        - Для восстановления
      need: 2
    connect_popup:
      expected: 'Появляется окно подключения диска: «Выберите диск для подключения», «URL диска», «Подключить».'
      tokens:
        - Выберите диск для подключения
        - URL диска
        - Подключить
        - Р7-Диск
      need: 2
    settings:
      expected: 'Отображается раздел «Настройки»: «Язык интерфейса», «Масштабирование интерфейса».'
      tokens:
        - Настройки
        - Язык интерфейса
        - Масштабирование интерфейса
      need: 2
    about:
      expected: 'Отображается раздел «О программе»: «Р7-Офис. Профессиональный (десктопная версия)», «Техподдержка».'
      tokens:
        - Р7-Офис. Профессиональный (десктопная версия)
        - Техподдержка
        - Журнал изменений
      need: 1

toolbar_tabs:
  - name: Файл
    required:
      - Сведения
      - Сохранить как
    optional:
      - Скачать как
      - Версия
    need: 2
  - name: Вставка
    required:
      - Таблица
      - Изображение
    optional:
      - Диаграмма
      - Колонтитулы
    need: 2
  - name: Рисование
    required:
      - Перо
    optional:
      - Маркер
      - Ластик
    need: 1
  - name: Макет
    required:
      - Поля
      - Ориентация
    optional:
      - Размер
      - Колонки
    need: 2
  - name: Ссылки
    required:
      - Оглавление
    optional:
      - Сноска
      - Гиперссылка
      - Закладка
    need: 1
  - name: Совместная работа
    required:
      - Комментарий
    optional:
      - Сравнить
    need: 1
  - name: Защита
    required:
      - Зашифровать
    optional:
      - Подпись
    need: 1
  - name: Вид
    required:
      - Масштаб
    optional:
      - Линейка
      - Непечатаемые
    need: 1
  - name: Плагины
    required:
      - Макросы
    optional:
      - Менеджер
    need: 1

tolerances:
  layout:
    ui_shift_px_max: 5
  visibility:
    required_missing_is_fail: true
    optional_missing_is_warning: true
    optional_new_item_is_warning: true
